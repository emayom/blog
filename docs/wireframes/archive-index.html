<link rel="stylesheet" href="wireframe.css">
<style>
  /* 폴더 그리드 */
  .folder-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .folder-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 20px 12px 16px;
    border-radius: 10px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  .folder-item:hover { background: var(--fill-2); }

  /* 폴더 아이콘 (macOS 스타일) */
  .folder-icon {
    position: relative;
    width: 80px;
    height: 68px;
    flex: none;
  }
  /* 탭 */
  .folder-icon::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 34px; height: 14px;
    background: var(--fill);
    border-radius: 5px 5px 0 0;
  }
  /* 본체 */
  .folder-icon::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 58px;
    background: var(--fill);
    border-radius: 3px 8px 8px 8px;
  }
  /* 본체 상단 하이라이트 선 */
  .folder-icon .fold-line {
    position: absolute;
    bottom: 46px; left: 0; right: 0;
    height: 1px;
    background: rgba(0,0,0,.08);
    z-index: 1;
  }

  .folder-label { text-align: center; }
  .folder-year { font-size: 14px; font-weight: 600; color: var(--ink); }
  .folder-count { font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>
