<!DOCTYPE html>

<title>와이어프레임 — 책장 (PC)</title>
<link rel="stylesheet" href="wireframe.css">
<style>
  /* 메인 영역 패딩 */
  .bg-page {
    background: var(--bg);
    padding: 28px 32px;
  }

  /* 콘텐츠 카드 (overlay 아님, 일반 콘텐츠) */
  .overlay-card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    border: 1px solid var(--line);
    display: grid;
    grid-template-columns: 200px 1fr;
    overflow: hidden;
  }

  /* 사이드바 */
  .shelf-sidebar {
    border-right: 1px solid var(--line);
    background: #fafafa;
    padding: 20px 0;
  }
  .sn-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px; font-size: 13px; color: var(--muted);
    text-decoration: none; cursor: pointer;
  }
  .sn-item.on { color: var(--ink); font-weight: 600; background: #e8f0fe; }
  .sn-icon { width: 16px; height: 16px; border-radius: 3px; background: var(--fill); flex: none; }
  .sn-item.on .sn-icon { background: #4a6cf7; }

  /* 메인 콘텐츠 */
  .shelf-main { padding: 24px 28px; overflow-y: auto; }
  .shelf-main-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .shelf-main-title { font-size: 16px; font-weight: 600; color: var(--ink); }

  /* Featured */
  .featured-label {
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
  }
  .featured-poster-wrap { position: relative; display: inline-block; margin-bottom: 36px; }
  .featured-poster-wrap .ph-img { width: 150px; height: 210px; border-radius: 8px; }
  .featured-pin {
    position: absolute; top: 8px; left: 8px;
    width: 22px; height: 22px; border-radius: 50%; background: var(--ink);
  }
  .featured-poster-title { margin-top: 8px; width: 150px; }

  /* 연도 섹션 */
  .year-section { margin-bottom: 32px; }
  .year-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .year-title { font-size: 15px; font-weight: 600; color: var(--ink); }
  .see-all { font-size: 12px; color: var(--muted); text-decoration: none; }

  /* 캐러셀: 오른쪽 버튼만 */
  .carousel-row { display: flex; align-items: center; gap: 8px; }
  .carousel-row .carousel-inner { flex: 1; overflow: hidden; }
  .shelf-row { display: flex; gap: 12px; }
  .shelf-row .poster { flex: none; width: 110px; }
  .shelf-row .poster .ph-img { height: 155px; border-radius: 6px; }
  .shelf-row .poster .body { padding: 6px 2px; text-align: center; }
</style>
</head>
