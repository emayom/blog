name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Cache Playwright browsers
        if: ${{ hashFiles('playwright.config.*', 'vitest.config.*') != '' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-chromium-

      - name: Install Playwright Browsers
        if: ${{ hashFiles('playwright.config.*', 'vitest.config.*') != '' }}
        run: npx playwright install --with-deps chromium
        timeout-minutes: 10

      - name: Unit & Integration tests (Vitest)
        if: ${{ hashFiles('vitest.config.*') != '' }}
        run: npm test

      - name: E2E tests (Playwright)
        if: ${{ hashFiles('playwright.config.*') != '' }}
        run: npx playwright test --pass-with-no-tests
