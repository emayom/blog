name: CI

on:
  workflow_dispatch:
# 활성화 시 아래 주석 해제
#   pull_request:
#     branches: [main]
#   push:
#     branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Unit tests (Vitest)
        if: ${{ hashFiles('vitest.config.*') != '' }}
        run: npx vitest run

      - name: E2E tests (Playwright)
        if: ${{ hashFiles('playwright.config.*') != '' }}
        run: npx playwright test
